[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.23"
optimizer = true
optimizer_runs = 10_000
remappings = [
    "forge-std/=lib/forge-std/src/",
    "euler-earn/=lib/euler-earn/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/"
]

[fmt]
line_length = 120
tab_width = 4
